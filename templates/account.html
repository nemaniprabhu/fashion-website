{% extends "base.html" %}
{% block content %}

<div class="card shadow p-4 mx-auto" style="max-width:500px;">
  <div class="text-center">
    <h2>👤 My Account</h2>
    <hr>

    <h4>Welcome, {{ username }}</h4>
    <p class="text-muted">Fashion Hub Member</p>

    <div class="mt-4">
      <p><b>Cart Items:</b> {{ cart_count }}</p>
      <p><b>Account Status:</b> Active</p>
    </div>

    <a href="/cart" class="btn btn-warning w-100 mb-2">View Cart 🛒</a>
    <a href="/home" class="btn btn-dark w-100 mb-2">Continue Shopping</a>
    <a href="/logout" class="btn btn-danger w-100">Logout</a>
  </div>
</div>

{% endblock %}
