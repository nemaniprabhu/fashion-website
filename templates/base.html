<!DOCTYPE html>
<html>
<head>
    <title>Fashion Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
            color:#111;
            transition:0.3s;
            padding-bottom:80px;
        }

        body.dark-mode{
            background:#121212;
            color:white;
        }

        body.dark-mode .card{
            background:#1f1f1f;
            color:white;
        }

        body.dark-mode .navbar{
            background:#000 !important;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#111;
            display:flex;
            justify-content:space-around;
            padding:10px 0;
            z-index:999;
        }

        .bottom-nav a{
            color:white;
            text-decoration:none;
            text-align:center;
            font-size:14px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/home">🛍 Fashion Hub</a>

    <div>
      <a href="/home" class="btn btn-outline-light">Home</a>
      <a href="/cart" class="btn btn-outline-light">Cart 🛒</a>
      <a href="/wishlist" class="btn btn-outline-light">Wishlist ❤️</a>
      <a href="/account" class="btn btn-outline-light">My Account</a>
      <button onclick="toggleDarkMode()" class="btn btn-warning">🌙 Dark</button>
      <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<div class="bottom-nav">
    <a href="/home">🏠<br>Home</a>
    <a href="/men">🛍<br>Category</a>
    <a href="/cart">🛒<br>Cart</a>
    <a href="/wishlist">❤️<br>Wishlist</a>
    <a href="/account">👤<br>Account</a>
</div>

<script>
function toggleDarkMode(){
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme", "dark");
    }else{
        localStorage.setItem("theme", "light");
    }
}

window.onload = function(){
    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark-mode");
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
